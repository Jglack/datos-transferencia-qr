<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datos de Transferencia — CodeMyc</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e8eef5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #1a1a1a;
    }
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(2, 62, 98, 0.12);
      max-width: 440px;
      width: 100%;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #1F89C7 0%, #023E62 100%);
      color: white;
      padding: 28px 24px;
      text-align: center;
    }
    .header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }
    .header p {
      font-size: 0.85rem;
      opacity: 0.85;
    }
    .fields {
      padding: 20px;
    }
    .field {
      margin-bottom: 12px;
      padding: 14px 16px;
      background: #f8f9fb;
      border-radius: 12px;
      border: 1px solid #e5e9f0;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .field:hover, .field:active {
      border-color: #1F89C7;
      background: #f0f7fc;
    }
    .field:last-child { margin-bottom: 0; }
    .field-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b7280;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .field-value {
      font-size: 0.98rem;
      font-weight: 500;
      color: #023E62;
      word-break: break-all;
      flex: 1;
      line-height: 1.3;
    }
    .field-value.mono {
      font-family: 'SF Mono', Monaco, 'Cascadia Code', Consolas, monospace;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }
    .copy-btn {
      background: #1F89C7;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s ease;
      min-width: 72px;
    }
    .copy-btn:hover { background: #023E62; }
    .copy-btn.copied { background: #10b981; }
    .copy-all {
      margin: 4px 20px 20px;
      width: calc(100% - 40px);
      padding: 14px;
      background: #023E62;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .copy-all:hover { background: #1F89C7; }
    .copy-all.copied { background: #10b981; }
    .footer {
      text-align: center;
      padding: 14px;
      font-size: 0.7rem;
      color: #9ca3af;
      border-top: 1px solid #f0f2f5;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>Datos de Transferencia</h1>
      <p>Toca cualquier campo para copiar</p>
    </div>

    <div class="fields">
      <div class="field" onclick="copyField(this, '722969012310645481')">
        <div class="field-label">CLABE</div>
        <div class="field-row">
          <span class="field-value mono">7229 6901 2310 6454 81</span>
          <button class="copy-btn" type="button">Copiar</button>
        </div>
      </div>

      <div class="field" onclick="copyField(this, 'Jose Antonio Maturin Manjarrez')">
        <div class="field-label">Beneficiario</div>
        <div class="field-row">
          <span class="field-value">Jose Antonio Maturin Manjarrez</span>
          <button class="copy-btn" type="button">Copiar</button>
        </div>
      </div>

      <div class="field" onclick="copyField(this, 'Mercado Pago W')">
        <div class="field-label">Institución</div>
        <div class="field-row">
          <span class="field-value">Mercado Pago W</span>
          <button class="copy-btn" type="button">Copiar</button>
        </div>
      </div>
    </div>

    <button class="copy-all" type="button" onclick="copyAll(this)">
      Copiar todos los datos
    </button>

    <div class="footer">Gracias por su preferencia</div>
  </div>

  <script>
    function showCopied(btn) {
      const original = btn.textContent;
      btn.textContent = '¡Copiado!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = original;
        btn.classList.remove('copied');
      }, 1500);
    }

    function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text);
      }
      // Fallback para navegadores viejos
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
      return Promise.resolve();
    }

    function copyField(el, text) {
      copyText(text).then(() => {
        const btn = el.querySelector('.copy-btn');
        showCopied(btn);
      });
    }

    function copyAll(btn) {
      const text =
        'CLABE: 722969012310645481\n' +
        'Beneficiario: Jose Antonio Maturin Manjarrez\n' +
        'Institución: Mercado Pago W';
      copyText(text).then(() => showCopied(btn));
    }
  </script>
</body>
</html>
