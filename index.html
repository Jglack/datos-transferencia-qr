<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>Datos de Transferencia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #1a1a1a;
    }
    .card {
      background: #ffffff;
      border-radius: 8px;
      border: 1px solid #e1e4e8;
      max-width: 440px;
      width: 100%;
      overflow: hidden;
    }
    .header {
      background: #023E62;
      color: #ffffff;
      padding: 24px;
      border-bottom: 3px solid #1F89C7;
    }
    .header h1 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }
    .header p {
      font-size: 0.82rem;
      color: #b8cfde;
    }
    .fields {
      padding: 20px;
    }
    .field {
      margin-bottom: 10px;
      padding: 14px 16px;
      background: #ffffff;
      border-radius: 6px;
      border: 1px solid #e1e4e8;
      transition: border-color 0.15s ease;
      cursor: pointer;
    }
    .field:hover, .field:active {
      border-color: #1F89C7;
    }
    .field:last-child { margin-bottom: 0; }
    .field-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6a737d;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .field-value {
      font-size: 0.95rem;
      font-weight: 500;
      color: #1a1a1a;
      flex: 1;
      min-width: 0;
      line-height: 1.35;
      overflow-wrap: break-word;
    }
    .field-value.mono {
      font-family: 'SF Mono', Monaco, 'Cascadia Code', Consolas, monospace;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      color: #023E62;
      /* Prevenir que iOS lo detecte como tel y quite estilos de link */
      text-decoration: none;
    }
    /* Si iOS insiste en hacerlo link */
    a[href^="tel"], a[href^="sms"] {
      color: inherit !important;
      text-decoration: none !important;
    }
    .copy-btn {
      background: #ffffff;
      color: #023E62;
      border: 1px solid #d1d5da;
      padding: 7px 14px;
      border-radius: 5px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      min-width: 72px;
      transition: all 0.15s ease;
    }
    .copy-btn:hover {
      background: #f6f8fa;
      border-color: #023E62;
    }
    .copy-btn.copied {
      background: #023E62;
      color: #ffffff;
      border-color: #023E62;
    }
    .copy-all {
      margin: 4px 20px 20px;
      width: calc(100% - 40px);
      padding: 13px;
      background: #023E62;
      color: #ffffff;
      border: 1px solid #023E62;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .copy-all:hover { background: #012d48; }
    .copy-all.copied { background: #1F89C7; border-color: #1F89C7; }
    .footer {
      text-align: center;
      padding: 14px;
      font-size: 0.7rem;
      color: #6a737d;
      border-top: 1px solid #e1e4e8;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* Pantallas angostas: apilar botón debajo del valor */
    @media (max-width: 400px) {
      .field-row {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }
      .copy-btn {
        width: 100%;
        padding: 9px;
      }
      .field-value.mono {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>Datos de Transferencia</h1>
      <p>Toca cualquier campo para copiar</p>
    </div>

    <div class="fields">
      <div class="field" onclick="copyField(this, '722969012310645481')">
        <div class="field-label">CLABE</div>
        <div class="field-row">
          <span class="field-value mono">7229 6901 2310 6454 81</span>
          <button class="copy-btn" type="button">Copiar</button>
        </div>
      </div>

      <div class="field" onclick="copyField(this, 'Jose Antonio Maturin Manjarrez')">
        <div class="field-label">Beneficiario</div>
        <div class="field-row">
          <span class="field-value">Jose Antonio Maturin Manjarrez</span>
          <button class="copy-btn" type="button">Copiar</button>
        </div>
      </div>

      <div class="field" onclick="copyField(this, 'Mercado Pago W')">
        <div class="field-label">Institución</div>
        <div class="field-row">
          <span class="field-value">Mercado Pago W</span>
          <button class="copy-btn" type="button">Copiar</button>
        </div>
      </div>
    </div>

    <button class="copy-all" type="button" onclick="copyAll(this)">
      Copiar todos los datos
    </button>

    <div class="footer">Gracias por su preferencia</div>
  </div>

  <script>
    function showCopied(btn) {
      const original = btn.textContent;
      btn.textContent = '¡Copiado!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = original;
        btn.classList.remove('copied');
      }, 1500);
    }

    function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text);
      }
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
      return Promise.resolve();
    }

    function copyField(el, text) {
      copyText(text).then(() => {
        const btn = el.querySelector('.copy-btn');
        showCopied(btn);
      });
    }

    function copyAll(btn) {
      const text =
        'CLABE: 722969012310645481\n' +
        'Beneficiario: Jose Antonio Maturin Manjarrez\n' +
        'Institución: Mercado Pago W';
      copyText(text).then(() => showCopied(btn));
    }
  </script>
</body>
</html>
